<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - SkillPath Academy</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="logo">SkillPath<span>Academy</span></a>
        </div>
    </nav>

    <section class="section">
        <div class="container" style="max-width: 800px;">
            <h1 class="text-center mb-4">Complete Your Enrollment</h1>

            <div class="grid grid-2" style="gap: 2rem;">
                <div>
                    <div class="card mb-3">
                        <div class="card-body">
                            <h3>Course Summary</h3>
                            <h4 id="courseName"></h4>
                            <p id="courseDuration"></p>
                            <hr>
                            <div class="flex-between">
                                <strong>Total:</strong>
                                <strong id="coursePrice"
                                    style="font-size: 1.5rem; color: var(--primary-color);"></strong>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="card">
                        <div class="card-body">
                            <h3>Payment Method</h3>
                            <div class="form-group">
                                <label class="form-label">Select Payment Method</label>
                                <select id="paymentMethod" class="form-select">
                                    <option value="card">Credit/Debit Card</option>
                                    <option value="mpesa">M-Pesa</option>
                                </select>
                            </div>

                            <div id="cardPayment">
                                <div class="form-group">
                                    <label class="form-label">Card Number</label>
                                    <input type="text" class="form-input" placeholder="1234 5678 9012 3456">
                                </div>
                                <div class="grid grid-2">
                                    <div class="form-group">
                                        <label class="form-label">Expiry Date</label>
                                        <input type="text" class="form-input" placeholder="MM/YY">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">CVV</label>
                                        <input type="text" class="form-input" placeholder="123">
                                    </div>
                                </div>
                            </div>

                            <div id="mpesaPayment" class="hidden">
                                <div class="form-group">
                                    <label class="form-label">M-Pesa Phone Number</label>
                                    <input type="tel" id="mpesaPhone" class="form-input" placeholder="0712345678">
                                </div>
                                <div class="alert alert-info">
                                    <p>You will receive an M-Pesa prompt on your phone to complete the payment.</p>
                                </div>
                            </div>

                            <button id="payBtn" class="btn btn-primary btn-large btn-block">Complete Payment</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const user = getCurrentUser();
        if (!user) {
            window.location.href = 'login.html';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const courseId = parseInt(urlParams.get('courseId'));

        const courses = JSON.parse(localStorage.getItem('courses') || '[]');
        const course = courses.find(c => c.id === courseId);

        if (course) {
            document.getElementById('courseName').textContent = course.title;
            document.getElementById('courseDuration').textContent = course.duration;
            document.getElementById('coursePrice').textContent = `KSH ${course.price.toLocaleString()}`;
        }

        // Payment method toggle
        document.getElementById('paymentMethod').addEventListener('change', function (e) {
            if (e.target.value === 'mpesa') {
                document.getElementById('cardPayment').classList.add('hidden');
                document.getElementById('mpesaPayment').classList.remove('hidden');
            } else {
                document.getElementById('cardPayment').classList.remove('hidden');
                document.getElementById('mpesaPayment').classList.add('hidden');
            }
        });

        // Process payment
        document.getElementById('payBtn').addEventListener('click', function () {
            const paymentMethod = document.getElementById('paymentMethod').value;

            // Simulate payment processing
            alert('Processing payment...');

            setTimeout(async () => {
                const result = await enrollInCourse(courseId);

                if (result.success) {
                    alert('Payment successful! You are now enrolled in the course.');
                    window.location.href = 'dashboard.html';
                } else {
                    alert(result.message);
                }
            }, 1000);
        });
    </script>
</body>

</html>
